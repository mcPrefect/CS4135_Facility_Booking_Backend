spring.application.name=user-service
spring.datasource.url=jdbc:postgresql://localhost:5432/user_service_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgresPass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:plassey-planner-secret-key-for-hs256-minimum-32-bytes}
server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

rabbitmq.exchange=${RABBITMQ_EXCHANGE:user.events}
rabbitmq.routing.user-regitered=${RABBITMQ_ROUTING_USER_REGISTERED:user.registered}

