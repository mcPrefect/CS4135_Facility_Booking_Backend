spring.application.name=user-service
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/user_service_db}
spring.datasource.username=${DB_USER:plassey}
spring.datasource.password=${DB_PASSWORD:plassey_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:my-super-secret-key-which-is-long-enough-123456}
server.port=8081

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

rabbitmq.exchange=${RABBITMQ_EXCHANGE:user.events}
rabbitmq.routing.user-registered=${RABBITMQ_ROUTING_USER_REGISTERED:user.registered}

