services:
  postgres:
    image: postgres:16-alpine
    container_name: user-postgres
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: plassey
      POSTGRES_PASSWORD: plassey_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plassey -d user_service_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: plassey-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  (http://localhost:15672 guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: plassey-eureka
    ports:
      - "8761:8761"

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plassey-user
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: 8081
      DB_URL: jdbc:postgresql://postgres:5432/user_service_db
      DB_USER: plassey
      DB_PASSWORD: plassey_secret
      DB_DRIVER: org.postgresql.Driver
      DB_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      EUREKA_URL: http://eureka-server:8761/eureka/
      JWT_SECRET: my-super-secret-key-which-is-long-enough-123456
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres-data:
  rabbitmq-data: