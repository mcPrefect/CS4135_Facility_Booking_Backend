# config/facility-service.yml
# Served by Spring Cloud Config Server to all instances of facility-service.
# Override any property from application.yml here per environment.

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/facilitydb
    username: plassey
    password: plassey_secret

app:
  jwt:
    secret: plassey-planner-secret-key-for-hs256-minimum-32-bytes
    expiration-ms: 3600000

resilience4j:
  circuitbreaker:
    instances:
      facilityPublisher:
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

logging:
  level:
    com.plassey.facilityservice: INFO
