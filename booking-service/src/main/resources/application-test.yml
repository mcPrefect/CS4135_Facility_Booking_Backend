spring:
  config:
    import: ""                    # disable config server in tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  rabbitmq:
    host: localhost               # overridden by TestContainers dynamic properties
    port: 5672

eureka:
  client:
    enabled: false                # no Eureka registration during tests

facility:
  service:
    url: http://localhost:9999    # unreachable — circuit breaker tested separately

jwt:
  secret: plassey-planner-secret-key-for-hs256-minimum-32-bytes

resilience4j:
  circuitbreaker:
    instances:
      facilityService:
        slidingWindowSize: 3
        failureRateThreshold: 50
        waitDurationInOpenState: 1s

rabbitmq:
  exchanges:
    booking-events: booking.events
  queues:
    approval-events: booking.approval.events.queue
    facility-status: booking.facility.status.queue
    dlq: booking.events.dlq

server:
  port: 0                         # random port for parallel tests
