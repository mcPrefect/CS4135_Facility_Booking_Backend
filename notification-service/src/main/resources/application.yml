spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  mail:
    host: smtp.mailtrap.io
    port: 2525
    username: your_mailtrap_user
    password: your_mailtrap_pass
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8085

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

rabbitmq:
  exchanges:
    booking-events: booking.events
  queues:
    booking-events: notification.booking.events.queue
    dlq: booking.events.dlq

resilience4j:
  circuitbreaker:
    instances:
      emailDispatch:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
      userServiceCall:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 15s
        permittedNumberOfCallsInHalfOpenState: 2
  timelimiter:
    instances:
      userServiceCall:
        timeoutDuration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
  endpoint:
    health:
      show-details: always
